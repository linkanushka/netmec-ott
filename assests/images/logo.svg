<div style="max-width: 600px; width: 100%;">
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 680 160"
     width="100%" height="auto"
     preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="NETMOC logo">

  <title>NETMOC</title>

  <style>
    .logo-group { animation: drift 3s ease-in-out infinite; }
    .play-btn   { animation: pulse 1.2s ease-in-out infinite alternate;
                  transform-origin: 634px 80px; }
    @keyframes drift {
      0%, 100% { transform: translateX(0); }
      50%       { transform: translateX(8px); }
    }
    @keyframes pulse {
      from { transform: scale(1);    opacity: 1;   }
      to   { transform: scale(1.22); opacity: 0.6; }
    }
  </style>

  <g class="logo-group">
    <text
      x="295" y="80"
      text-anchor="middle"
      dominant-baseline="central"
      fill="#FFD400"
      font-family="'Arial Black', 'Arial Bold', Helvetica, sans-serif"
      font-size="108"
      font-weight="900"
      letter-spacing="-5">NETM≋C</text>

    <text
      class="play-btn"
      x="634" y="80"
      text-anchor="middle"
      dominant-baseline="central"
      fill="#FFD400"
      font-family="'Arial Black', Helvetica, sans-serif"
      font-size="80">▶</text>
  </g>

</svg>
</div>